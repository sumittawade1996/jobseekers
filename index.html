<!DOCTYPE html>
<html>
<head>
  <title>Job Seekers love Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin:0; background:#f5f7fa; }
    header {
      background:#0a66c2;
      color:white;
      padding:20px;
      text-align:center;
    }
    .container { padding:20px; }
    .job {
      background:white;
      padding:15px;
      margin-bottom:15px;
      border-radius:12px;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }
    .job h3 { margin:0; }
    .btn {
      display:inline-block;
      margin-top:10px;
      padding:8px 12px;
      background:#0a66c2;
      color:white;
      border-radius:6px;
      text-decoration:none;
    }
    .btn:hover { background:#004182; }
  </style>
</head>

<body>

<header>
  <h1>🚀 Job Seekers Portal</h1>
  <p>Latest Jobs | Freshers | IT | Banking</p>
</header>

<div class="container">

  <div class="job">
    <h3>SQL Developer</h3>
    <p>💰 Salary: ₹5–8 LPA</p>
    <p>📍 Location: Mumbai</p>
    <a class="btn" href="#">Apply Now</a>
  </div>

  <div class="job">
    <h3>Bank Clerk</h3>
    <p>💰 Salary: ₹3–6 LPA</p>
    <p>📍 Location: India</p>
    <a class="btn" href="#">Apply Now</a>
  </div>

</div>

</body>
</html>
